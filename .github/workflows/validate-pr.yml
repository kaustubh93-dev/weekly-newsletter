# Validate PR — runs on every pull request to main
# Checks that newsletter edition outputs are valid before merging

name: Validate Newsletter PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'editions/**'

jobs:
  validate:
    name: Validate Edition Outputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed editions
        id: detect
        run: |
          # Find edition folders that were changed in this PR
          CHANGED_EDITIONS=$(git diff --name-only origin/main...HEAD | grep '^editions/' | cut -d'/' -f1-2 | sort -u)
          echo "Changed editions:"
          echo "$CHANGED_EDITIONS"
          
          if [ -z "$CHANGED_EDITIONS" ]; then
            echo "No edition changes detected"
            echo "has_editions=false" >> $GITHUB_OUTPUT
          else
            echo "has_editions=true" >> $GITHUB_OUTPUT
            # Convert to space-separated list
            EDITION_LIST=$(echo "$CHANGED_EDITIONS" | tr '\n' ' ')
            echo "editions=$EDITION_LIST" >> $GITHUB_OUTPUT
          fi

      - name: Validate editions
        if: steps.detect.outputs.has_editions == 'true'
        run: |
          EXIT_CODE=0
          for edition in ${{ steps.detect.outputs.editions }}; do
            echo "::group::Validating $edition"
            python scripts/validate_outputs.py --edition "$edition" || EXIT_CODE=1
            echo "::endgroup::"
          done
          exit $EXIT_CODE

      - name: Post validation results
        if: always() && steps.detect.outputs.has_editions == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const editions = '${{ steps.detect.outputs.editions }}'.trim().split(' ');
            
            let body = '## 📋 Newsletter Validation Results\n\n';
            
            for (const edition of editions) {
              try {
                const output = execSync(`python scripts/validate_outputs.py --edition "${edition}" 2>&1`, { encoding: 'utf8' });
                body += `### ✅ ${edition}\n\`\`\`\n${output}\n\`\`\`\n\n`;
              } catch (e) {
                body += `### ❌ ${edition}\n\`\`\`\n${e.stdout || e.message}\n\`\`\`\n\n`;
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
